<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Prompts</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
    ul { list-style: none; padding: 0; }
    li { padding: 10px; border-bottom: 1px solid #eee; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>My Prompts</h1>
    <a href="{% url 'logout' %}">Log out</a>
  </div>
  <p><a href="{% url 'prompt_add' %}">+ Add New Prompt</a></p>
  <ul>
    {% for prompt in prompts %}
      <li><a href="{% url 'prompt_detail' prompt.pk %}">{{ prompt.title }}</a> — <small>{{ prompt.created_at|date:"M d, Y" }}</small></li>
    {% empty %}
      <li>No prompts yet. Click "Add New Prompt" to create your first one.</li>
    {% endfor %}
  </ul>
</body>
</html>

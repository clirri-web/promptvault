{% extends "base.html" %}
{% block title %}Import Prompts{% endblock %}
{% block content %}

<h1 class="mb-4">Import Prompts</h1>

{% if message %}
  <div class="alert alert-info">{{ message }}</div>
{% endif %}

<form method="post" enctype="multipart/form-data" class="card card-body">
  {% csrf_token %}
  <label class="form-label">Select a PromptVault export JSON file</label>
  <input type="file" name="import_file" accept=".json" class="form-control mb-3" required>
  <button type="submit" class="btn btn-primary">Import</button>
</form>

<a href="{% url 'settings_page' %}" class="btn btn-outline-secondary mt-3">Back to Settings</a>

{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - PromptVault</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 400px; margin: 80px auto; padding: 0 20px; }
    input[type=text], input[type=password] { width: 100%; padding: 8px; margin: 6px 0 16px; box-sizing: border-box; }
    button { background: #2563eb; color: white; border: none; padding: 10px 18px; border-radius: 4px; cursor: pointer; width: 100%; }
  </style>
</head>
<body>
  <h1>PromptVault Login</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Log in</button>
  </form>
</body>
</html>

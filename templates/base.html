<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}PromptVault{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { transition: background-color 0.2s, color 0.2s; }
    .navbar-brand { font-weight: 600; }
    .tag { font-size: 12px; }
    pre.prompt-text { white-space: pre-wrap; background: var(--bs-secondary-bg); padding: 16px; border-radius: 8px; }
    .star-btn { text-decoration: none; font-size: 1.3rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="{% url 'dashboard' %}">PromptVault</a>
      {% if user.is_authenticated %}
        <div class="d-flex align-items-center flex-wrap">
          <a class="btn btn-outline-light btn-sm me-2 mb-1" href="{% url 'dashboard' %}">Dashboard</a>
          <a class="btn btn-outline-light btn-sm me-2 mb-1" href="{% url 'prompt_list' %}">My Prompts</a>
          <a class="btn btn-outline-light btn-sm me-2 mb-1" href="{% url 'shared_list' %}">Shared with me</a>
          <a class="btn btn-outline-light btn-sm me-2 mb-1" href="{% url 'prompt_add' %}">+ Add Prompt</a>
          <a class="btn btn-outline-light btn-sm me-2 mb-1" href="{% url 'settings_page' %}">Settings</a>
          <button class="btn btn-outline-light btn-sm me-2 mb-1" id="themeToggle" type="button" title="Toggle dark mode">&#9788;</button>
          <a class="btn btn-outline-light btn-sm mb-1" href="{% url 'logout' %}">Log out</a>
        </div>
      {% endif %}
    </div>
  </nav>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <script>
    (function () {
      var storageKey = 'promptvault-theme';
      var htmlEl = document.documentElement;
      var toggleBtn = document.getElementById('themeToggle');

      function applyTheme(theme) {
        htmlEl.setAttribute('data-bs-theme', theme);
        if (toggleBtn) {
          toggleBtn.innerHTML = theme === 'dark' ? '&#9790;' : '&#9788;';
        }
      }

      var saved = localStorage.getItem(storageKey) || 'light';
      applyTheme(saved);

      if (toggleBtn) {
        toggleBtn.addEventListener('click', function () {
          var current = htmlEl.getAttribute('data-bs-theme');
          var next = current === 'dark' ? 'light' : 'dark';
          localStorage.setItem(storageKey, next);
          applyTheme(next);
        });
      }
    })();
  </script>
</body>
</html>
